<!DOCTYPE html>
<html lang="zh-CN">

    <meta charset="UTF-8" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marcus AI Trading Platform</title>
    <!-- 防闪烁脚本：在 React 挂载前立即应用存储的主题 -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('marcus-theme-storage');
          if (stored) {
            var parsed = JSON.parse(stored);
            var theme = parsed.state && parsed.state.theme;
            if (theme === 'light') {
              document.documentElement.setAttribute('data-theme', 'light');
            }
          }
        } catch(e) {}
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-BNyRulCp.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-G_T_eRkw.css">
  </head>

  </body>
</html>
