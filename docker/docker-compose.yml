# Marcus AI Trading Platform - Docker Compose Configuration

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: marcus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: marcus
      POSTGRES_PASSWORD: ${DB_PASSWORD:-marcus123}
      POSTGRES_DB: marcus_trading
      TZ: Asia/Shanghai
    ports:
      # 开发/调试用：如需外部访问，将 127.0.0.1 改为 0.0.0.0（见下方说明）
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marcus -d marcus_trading"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: marcus-backend
    env_file:
      - ../.env
    environment:
      TZ: Asia/Shanghai
      MARCUS_WORKSPACE: /app
      PI_SERVER_URL: http://piserver:3001/chat
      DATABASE_URL: postgresql://marcus:${DB_PASSWORD:-marcus123}@postgres:5432/marcus_trading
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../apps:/app/apps:ro
      - ../config:/app/config
      - ../logs:/app/logs
      - ../memory:/app/memory
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Pi Server (Pi Agent HTTP Server)
  piserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.piserver
    container_name: marcus-piserver
    env_file:
      - ../.env
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      PI_SERVER_PORT: "3001"
      MARCUS_API_URL: http://backend:8000/api/v1
    ports:
      - "3001:3001"
    volumes:
      - ../servers/pi-server/sessions:/app/sessions
    depends_on:
      - backend
    restart: unless-stopped

  # Frontend (Production Build)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: marcus-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend
      - piserver

volumes:
  pgdata:
