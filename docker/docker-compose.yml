# Marcus AI Trading Platform - Docker Compose Configuration

version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: marcus-backend
    env_file:
      - ../.env
    environment:
      TZ: Asia/Shanghai
      MARCUS_WORKSPACE: /app
      PI_SERVER_URL: http://piserver:3001/chat
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../apps:/app/apps:ro
      - ../logs:/app/logs
      - ../memory:/app/memory
      - /etc/localtime:/etc/localtime:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Pi Server (Pi Agent HTTP Server)
  piserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.piserver
    container_name: marcus-piserver
    env_file:
      - ../.env
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      PI_SERVER_PORT: "3001"
      MARCUS_API_URL: http://backend:8000/api/v1
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

  # Frontend (Production Build)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: marcus-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend
      - piserver
