# Marcus AI Trading Platform - Docker Compose Configuration

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: marcus-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      POSTGRES_USER: marcus
      POSTGRES_PASSWORD: ${DB_PASSWORD:-marcus123}
      POSTGRES_DB: marcus_trading
      TZ: Asia/Shanghai
    ports:
      # 外部访问用 "5432:5432"，仅本机访问用 "127.0.0.1:5432:5432"
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marcus -d marcus_trading"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend API
  backend:
    deploy:
      resources:
        limits:
          memory: 512M
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: marcus-backend
    env_file:
      - ../.env
    environment:
      TZ: Asia/Shanghai
      MARCUS_WORKSPACE: /app
      PI_SERVER_URL: http://piserver:3001/chat
      DATABASE_URL: postgresql://marcus:${DB_PASSWORD:-marcus123}@postgres:5432/marcus_trading
      EASTMONEY_COOKIE: ${EASTMONEY_COOKIE}
      EM_PROXY_URL: http://81.70.44.68:8199
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../apps:/app/apps:ro
      - ../config:/app/config
      - ../logs:/app/logs
      - ../memory:/app/memory
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Pi Server (Pi Agent HTTP Server)
  piserver:
    deploy:
      resources:
        limits:
          memory: 256M
    build:
      context: ..
      dockerfile: docker/Dockerfile.piserver
    container_name: marcus-piserver
    env_file:
      - ../.env
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      PI_SERVER_PORT: "3001"
      MARCUS_API_URL: http://backend:8000/api/v1
    ports:
      - "3001:3001"
    volumes:
      - ../servers/pi-server/sessions:/app/sessions
    depends_on:
      - backend
    restart: unless-stopped

  # Frontend (本地预构建 dist，Dockerfile 只 COPY 到 nginx)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: marcus-frontend
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "80:80"
    depends_on:
      - backend
      - piserver

volumes:
  pgdata:
