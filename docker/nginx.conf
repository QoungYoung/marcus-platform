server {
    listen 80;
    server_name marcus.tsingyoung.uk;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # React Router fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Panel SSE stream → pi-server 直连，绕过后端缓冲层
    location = /api/v1/panel/reflect/stream {
        proxy_pass http://piserver:3001/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        gzip off;
        proxy_read_timeout 600s;
        proxy_send_timeout 60s;
    }

    # API proxy (SSE needs buffering off)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        # SSE support: disable proxy buffering for streaming responses
        proxy_buffering off;
        gzip off;
    }

    # Pi Server proxy
    location /pi/ {
        proxy_pass http://piserver:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
